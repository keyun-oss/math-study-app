<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小数的加减运算</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Comic Sans MS', 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #f0fdf4, #e0f2fe);
      padding: 24px;
      min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 {
      font-size: 28px; color: #2e7d32;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }
    .card {
      background: white; border-radius: 24px; padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      border: 2px solid #e8f5e9;
    }
    .card h2 {
      font-size: 18px; color: #388e3c;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .example {
      background: #f1f8e9;
      border-radius: 16px; padding: 16px;
      margin: 12px 0;
      border-left: 4px solid #4caf50;
    }
    .example .calc {
      font-size: 28px; font-weight: 700;
      color: #1b5e20; text-align: center;
      padding: 8px 0;
    }
    .tip {
      background: #fff8e1; border-radius: 16px;
      padding: 12px 16px; margin-top: 12px;
      border: 2px dashed #ffe082;
      font-size: 14px; color: #e65100;
    }
    .practice {
      background: #e3f2fd; border-radius: 20px;
      padding: 16px; text-align: center;
      border: 2px solid #90caf9;
    }
    .practice .big-num {
      font-size: 42px; font-weight: 900; color: #1565c0;
    }
    .practice button {
      background: #4caf50; color: white; border: none;
      border-radius: 40px; padding: 10px 24px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin: 4px; transition: all 0.2s;
    }
    .practice button:hover { transform: scale(1.05); }
    .practice button:active { transform: scale(0.95); }
    @media (max-width: 600px) {
      body { padding: 16px; }
      h1 { font-size: 22px; }
      .example .calc { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧮 小数的加减运算</h1>

    <div class="card">
      <h2>📖 什么是小数加减法？</h2>
      <p style="color:#555;line-height:1.8;font-size:16px;">
        小数加减法和整数加减法的规则<strong>完全一样</strong>，只需要记住一个关键点：
      </p>
      <div class="tip">
        ⭐ <strong>小数点要对齐！</strong> 这样相同数位才能相加减。
      </div>
    </div>

    <div class="card">
      <h2>📝 例题 1</h2>
      <div class="example">
        <div class="calc">3.45 + 2.3 = ?</div>
        <div style="text-align:center;color:#888;font-size:14px;">
          ✏️ 对齐小数点：3.45 + 2.30 = <strong style="color:#4caf50;font-size:22px;">5.75</strong>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>📝 例题 2</h2>
      <div class="example">
        <div class="calc">7.6 - 2.48 = ?</div>
        <div style="text-align:center;color:#888;font-size:14px;">
          ✏️ 补0对齐：7.60 - 2.48 = <strong style="color:#4caf50;font-size:22px;">5.12</strong>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>🎯 来试试！</h2>
      <div class="practice">
        <p style="color:#555;margin-bottom:8px;">计算下面这道题：</p>
        <div class="big-num">6.7 + 3.25 = ?</div>
        <div style="margin-top:12px;">
          <button onclick="check(9.95)">9.95</button>
          <button onclick="check(9.75)" style="background:#e0e0e0;color:#333;">9.75</button>
          <button onclick="check(10.25)" style="background:#e0e0e0;color:#333;">10.25</button>
        </div>
        <p id="result" style="margin-top:12px;font-weight:700;font-size:18px;min-height:28px;"></p>
      </div>
    </div>
  </div>

  <script>
    function check(val) {
      const res = document.getElementById('result');
      if (val === 9.95) {
        res.innerHTML = '🎉 正确！6.70 + 3.25 = 9.95';
        res.style.color = '#2e7d32';
      } else {
        res.innerHTML = '😅 再想想哦～记得小数点对齐！';
        res.style.color = '#c62828';
      }
    }
  </script>
</body>
</html>
